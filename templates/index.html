<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>股市監控 Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body { background: #0f1117; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; }
    .navbar { background: #1a1d27 !important; border-bottom: 1px solid #2a2d3a; }
    .navbar-brand { font-weight: 700; font-size: 1.3rem; color: #60a5fa !important; }
    .nav-link-guitar { color: #9ca3af; text-decoration: none; padding: 6px 14px; border-radius: 8px; font-size: 0.9rem; transition: all .15s; }
    .nav-link-guitar:hover { background: #2a2d3a; color: #a78bfa; }
    .card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 12px; }
    .card-header { background: #1e2130; border-bottom: 1px solid #2a2d3a; border-radius: 12px 12px 0 0 !important; }
    .badge-tw { background: #1d4ed8; }
    .badge-us { background: #7c3aed; }
    .price-up { color: #34d399; }
    .price-down { color: #f87171; }
    .price-flat { color: #9ca3af; }
    .inst-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 0.82rem; border-bottom: 1px solid #2a2d3a; }
    .inst-row:last-child { border-bottom: none; }
    .inst-label { color: #9ca3af; }
    .news-item { padding: 6px 0; border-bottom: 1px solid #2a2d3a; }
    .news-item:last-child { border-bottom: none; }
    .news-item a { color: #93c5fd; text-decoration: none; font-size: 0.82rem; line-height: 1.4; }
    .news-item a:hover { color: #60a5fa; text-decoration: underline; }
    .news-date { color: #6b7280; font-size: 0.72rem; margin-top: 2px; }
    .vol-text { color: #fbbf24; font-size: 0.9rem; }
    .price-main { font-size: 1.6rem; font-weight: 700; }
    .change-badge { font-size: 0.85rem; padding: 3px 8px; border-radius: 6px; }
    .section-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: #6b7280; margin-bottom: 6px; }
    .spinner-wrap { display: flex; align-items: center; gap: 8px; }
    #countdown { font-size: 0.78rem; color: #6b7280; }
    .add-form { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 12px; padding: 16px; margin-bottom: 24px; }
    .form-control, .form-select { background: #0f1117; border: 1px solid #374151; color: #e0e0e0; }
    .form-control:focus, .form-select:focus { background: #0f1117; color: #e0e0e0; border-color: #60a5fa; box-shadow: 0 0 0 0.2rem rgba(96,165,250,0.2); }
    .search-dropdown { position:absolute; top:100%; left:0; right:0; background:#1e2130; border:1px solid #374151; border-radius:8px; z-index:100; max-height:220px; overflow-y:auto; margin-top:2px; box-shadow:0 8px 24px rgba(0,0,0,0.5); }
    .search-dropdown-item { padding:9px 14px; cursor:pointer; border-bottom:1px solid #2a2d3a; font-size:0.88rem; }
    .search-dropdown-item:last-child { border-bottom:none; }
    .search-dropdown-item:hover, .search-dropdown-item.active { background:#2a2d3a; }
    .search-dropdown-item .item-ticker { color:#60a5fa; font-family:monospace; margin-right:8px; font-size:0.82rem; }
    .search-dropdown-item .item-market { font-size:0.7rem; padding:1px 6px; border-radius:4px; margin-left:6px; }
    .preview-chip { display:inline-flex; align-items:center; background:#1e2130; border:1px solid #374151; border-radius:20px; padding:4px 12px; font-size:0.88rem; }
    .btn-chip-clear { background:none; border:none; color:#6b7280; cursor:pointer; font-size:0.85rem; padding:0; line-height:1; }
    .btn-chip-clear:hover { color:#f87171; }
    .stock-name { font-size: 1.15rem; font-weight: 700; color: #f1f5f9; letter-spacing: 0.01em; }
    .stock-ticker { font-size: 0.78rem; color: #6b7280; margin-top: 1px; letter-spacing: 0.05em; }
    .btn-delete { background: transparent; border: none; color: #6b7280; padding: 2px 6px; }
    .btn-delete:hover { color: #f87171; }
    .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .empty-state { text-align: center; padding: 60px 20px; color: #6b7280; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid px-4">
    <span class="navbar-brand"><i class="bi bi-graph-up-arrow me-2"></i>股市監控</span>
    <a href="/portfolio" class="nav-link-guitar">持倉監控</a>
    <div class="ms-auto d-flex align-items-center gap-3">
      <a href="/portfolio" class="nav-link-guitar">持倉監控</a>
      <a href="/food" class="nav-link-guitar"><i class="bi bi-egg-fried me-1"></i>日常飲食</a>
      <a href="/guitar" class="nav-link-guitar"><i class="bi bi-music-note-beamed me-1"></i>吉他學習</a>
      <span id="countdown"></span>
      <button class="btn btn-sm btn-outline-primary" id="btn-refresh">
        <i class="bi bi-arrow-clockwise me-1"></i>立即更新
      </button>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-4">

  <!-- Add company form -->
  <div class="add-form">
    <div class="row g-2 align-items-start">
      <div class="col-md-5 col-lg-4 position-relative">
        <label class="form-label small text-secondary">搜尋股票（代號或公司名稱）</label>
        <input type="text" id="inp-search" class="form-control form-control-sm"
               placeholder="e.g. 2330、台積電、AAPL、Tesla…" autocomplete="off" />
        <!-- Autocomplete dropdown -->
        <div id="search-dropdown" class="search-dropdown d-none"></div>
      </div>
      <div class="col-auto" style="padding-top:24px">
        <button class="btn btn-sm btn-primary d-none" id="btn-add" disabled>
          <i class="bi bi-plus-lg me-1"></i>新增監控
        </button>
      </div>
      <div class="col-auto" style="padding-top:24px">
        <span id="add-msg" class="small"></span>
      </div>
    </div>
    <!-- Preview chip (shown after selection) -->
    <div id="add-preview" class="d-none mt-2">
      <span class="preview-chip">
        <span id="preview-market-badge"></span>
        <span id="preview-name" class="fw-bold ms-1"></span>
        <span id="preview-ticker" class="text-secondary ms-1" style="font-size:0.8rem"></span>
        <button class="btn-chip-clear ms-2" onclick="clearPreview()">✕</button>
      </span>
    </div>
    <!-- Hidden fields carried to submit -->
    <input type="hidden" id="inp-ticker" />
    <input type="hidden" id="inp-name" />
    <input type="hidden" id="inp-market" />
  </div>

  <!-- Cards grid -->
  <div id="cards-grid" class="row g-3">
    <div class="empty-state col-12">
      <i class="bi bi-hourglass-split fs-1 d-block mb-3"></i>
      載入資料中...
    </div>
  </div>

  <div class="text-center mt-4 text-secondary small" id="last-updated"></div>
</div>

<!-- Loading overlay -->
<div class="loading-overlay d-none" id="loading">
  <div class="text-center text-white">
    <div class="spinner-border mb-3" role="status"></div>
    <div>更新資料中...</div>
  </div>
</div>

<script>
let nextRefresh = Date.now() + 15 * 60 * 1000;

function fmtVolume(v) {
  if (!v && v !== 0) return '—';
  if (v >= 1e8) return (v / 1e8).toFixed(2) + '億';
  if (v >= 1e4) return (v / 1e4).toFixed(1) + '萬';
  return v.toLocaleString();
}

function fmtNet(val) {
  if (val === undefined || val === null || val === '') return '—';
  const n = parseInt(val);
  if (isNaN(n)) return val;
  const abs = Math.abs(n);
  let str = abs >= 1000 ? (abs / 1000).toFixed(0) + '千' : abs.toLocaleString();
  if (n > 0) return `<span class="price-up">+${str}</span>`;
  if (n < 0) return `<span class="price-down">-${str}</span>`;
  return `<span class="price-flat">${str}</span>`;
}

function fmtChange(c, pct) {
  const cls = c > 0 ? 'price-up' : c < 0 ? 'price-down' : 'price-flat';
  const sign = c > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${c.toFixed(2)} (${sign}${pct.toFixed(2)}%)</span>`;
}

function renderCard(item) {
  const s = item.stock;
  const inst = item.institutional;
  const isTW = item.market === 'TW';
  const mktBadge = isTW
    ? '<span class="badge badge-tw ms-1">台股</span>'
    : '<span class="badge badge-us ms-1">美股</span>';

  const priceBlock = s ? `
    <div class="price-main ${s.change > 0 ? 'price-up' : s.change < 0 ? 'price-down' : 'price-flat'}">
      ${s.price.toLocaleString()}
    </div>
    <div class="mt-1">${fmtChange(s.change, s.change_pct)}</div>
    <div class="mt-1 vol-text"><i class="bi bi-bar-chart-fill me-1"></i>成交量 ${fmtVolume(s.volume)}</div>
  ` : '<div class="text-secondary small">股價資料無法取得</div>';

  const instBlock = isTW ? `
    <div class="section-title mt-3">三大法人 ${inst ? `<span class="text-muted">(${inst.date})</span>` : ''}</div>
    <div class="inst-row"><span class="inst-label">外資</span><span>${inst ? fmtNet(inst.foreign_net) : '—'}</span></div>
    <div class="inst-row"><span class="inst-label">投信</span><span>${inst ? fmtNet(inst.trust_net) : '—'}</span></div>
    <div class="inst-row"><span class="inst-label">自營商</span><span>${inst ? fmtNet(inst.dealer_net) : '—'}</span></div>
    <div class="inst-row"><span class="inst-label fw-bold">合計</span><span>${inst ? fmtNet(inst.total_net) : '—'}</span></div>
  ` : '';

  const newsBlock = item.news && item.news.length ? `
    <div class="section-title mt-3">最新消息</div>
    ${item.news.map(n => `
      <div class="news-item">
        <a href="${n.link}" target="_blank" rel="noopener">${n.title}</a>
        <div class="news-date">${n.published ? new Date(n.published).toLocaleDateString('zh-TW') : ''}</div>
      </div>
    `).join('')}
  ` : '<div class="section-title mt-3 text-secondary small">暫無新聞</div>';

  return `
    <div class="col-xl-3 col-lg-4 col-md-6" id="card-${item.ticker}">
      <div class="card h-100">
        <div class="card-header d-flex justify-content-between align-items-center py-2">
          <div>
            <div class="d-flex align-items-center gap-2">
              <span class="stock-name">${item.name}</span>
              ${mktBadge}
            </div>
            <div class="stock-ticker">${item.ticker}</div>
          </div>
          <button class="btn-delete" onclick="deleteCompany('${item.ticker}')" title="移除">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
        <div class="card-body">
          ${priceBlock}
          ${instBlock}
          ${newsBlock}
          <div class="text-secondary mt-2" style="font-size:0.7rem">更新：${item.updated_at}</div>
        </div>
      </div>
    </div>
  `;
}

async function loadData() {
  try {
    const res = await fetch('/api/data');
    const items = await res.json();
    const grid = document.getElementById('cards-grid');

    if (!items.length) {
      grid.innerHTML = `<div class="empty-state col-12">
        <i class="bi bi-plus-circle fs-1 d-block mb-3"></i>
        還沒有監控的公司，請用上方表單新增。
      </div>`;
      return;
    }

    grid.innerHTML = items.map(renderCard).join('');

    const times = items.map(i => i.updated_at).filter(Boolean);
    if (times.length) {
      document.getElementById('last-updated').textContent = `資料更新時間：${times[0]}`;
    }
  } catch (e) {
    console.error(e);
  }
}

async function manualRefresh() {
  document.getElementById('loading').classList.remove('d-none');
  try {
    await fetch('/api/refresh', { method: 'POST' });
    await loadData();
    nextRefresh = Date.now() + 15 * 60 * 1000;
  } finally {
    document.getElementById('loading').classList.add('d-none');
  }
}

async function deleteCompany(ticker) {
  if (!confirm(`確定要移除 ${ticker}？`)) return;
  await fetch(`/api/watchlist/${ticker}`, { method: 'DELETE' });
  document.getElementById(`card-${ticker}`)?.remove();
  const grid = document.getElementById('cards-grid');
  if (!grid.children.length) loadData();
}

document.getElementById('btn-refresh').addEventListener('click', manualRefresh);

// ── Smart stock search ─────────────────────────────────────────────────────────
let searchTimer = null;
const inp = document.getElementById('inp-search');
const dropdown = document.getElementById('search-dropdown');

inp.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = inp.value.trim();
  if (!q) { dropdown.classList.add('d-none'); return; }
  searchTimer = setTimeout(() => doStockSearch(q), 300);
});

inp.addEventListener('keydown', e => {
  if (e.key === 'Escape') { dropdown.classList.add('d-none'); }
});

document.addEventListener('click', e => {
  if (!inp.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.add('d-none');
});

async function doStockSearch(q) {
  try {
    const res = await fetch('/api/stock/lookup?q=' + encodeURIComponent(q));
    const data = await res.json();
    if (!data) { dropdown.classList.add('d-none'); return; }

    const items = Array.isArray(data) ? data : [data];
    if (!items.length) { dropdown.classList.add('d-none'); return; }

    dropdown.innerHTML = items.map(item => {
      const mktColor = item.market === 'TW' ? '#1d4ed8' : '#7c3aed';
      const mktLabel = item.market === 'TW' ? '台股' : '美股';
      return `<div class="search-dropdown-item"
                   onclick="selectStock('${item.ticker}','${item.name.replace(/'/g,"\\'")}','${item.market}')">
        <span class="item-ticker">${item.ticker}</span>
        ${item.name !== item.ticker ? item.name : ''}
        <span class="item-market" style="background:${mktColor}">${mktLabel}</span>
      </div>`;
    }).join('');
    dropdown.classList.remove('d-none');
  } catch { dropdown.classList.add('d-none'); }
}

function selectStock(ticker, name, market) {
  dropdown.classList.add('d-none');
  inp.value = '';
  document.getElementById('inp-ticker').value = ticker;
  document.getElementById('inp-name').value = name;
  document.getElementById('inp-market').value = market;

  const mktColor = market === 'TW' ? '#1d4ed8' : '#7c3aed';
  const mktLabel = market === 'TW' ? '台股' : '美股';
  document.getElementById('preview-market-badge').innerHTML =
    `<span class="badge" style="background:${mktColor}">${mktLabel}</span>`;
  document.getElementById('preview-name').textContent = name;
  document.getElementById('preview-ticker').textContent = ticker;

  const preview = document.getElementById('add-preview');
  preview.classList.remove('d-none');
  const btn = document.getElementById('btn-add');
  btn.classList.remove('d-none');
  btn.disabled = false;
}

function clearPreview() {
  document.getElementById('add-preview').classList.add('d-none');
  document.getElementById('btn-add').classList.add('d-none');
  document.getElementById('inp-ticker').value = '';
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-market').value = '';
  document.getElementById('add-msg').textContent = '';
}

document.getElementById('btn-add').addEventListener('click', async () => {
  const ticker = document.getElementById('inp-ticker').value;
  const name = document.getElementById('inp-name').value;
  const market = document.getElementById('inp-market').value;
  const msg = document.getElementById('add-msg');

  msg.textContent = '新增中...';
  msg.className = 'small text-secondary';

  const res = await fetch('/api/watchlist', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ticker, name, market }),
  });
  const data = await res.json();

  if (data.error) {
    msg.textContent = data.error;
    msg.className = 'small text-danger';
  } else {
    msg.textContent = `${name} 已加入`;
    msg.className = 'small text-success';
    clearPreview();
    setTimeout(() => { loadData(); msg.textContent = ''; }, 2000);
  }
});

// Countdown timer
function updateCountdown() {
  const sec = Math.max(0, Math.round((nextRefresh - Date.now()) / 1000));
  const m = Math.floor(sec / 60), s = sec % 60;
  document.getElementById('countdown').textContent = `下次更新 ${m}:${String(s).padStart(2,'0')}`;
  if (sec === 0) {
    loadData();
    nextRefresh = Date.now() + 15 * 60 * 1000;
  }
}

setInterval(updateCountdown, 1000);
loadData();
</script>
</body>
</html>
